x-common-settings: &common-settings
  build:
    context: .
    dockerfile: .dockerfiles/Dockerfile
    target: release
  depends_on:
    db:
      condition: service_healthy
  environment:
    - "ALLOWED_HOSTS=*"
    - "DATABASE_URL=postgres://postgres@db/postgres"
    - "DJANGO_DEBUG=true"
    # Keep the project venv OUT of /src so the host bind-mount below can't
    # shadow it. Otherwise `uv run` rebuilds the venv on every invocation.
    - "UV_PROJECT_ENVIRONMENT=/opt/venv"
  env_file: .env
  init: true
  tty: true
  volumes:
    - ./media_root:/src/media_root:cache
    - ./static_root:/src/static_root:cache
    - .:/src:cache
    - django-tailwind-cli-data:/src/.django_tailwind_cli

services:

  db:
    image: "pgautoupgrade/pgautoupgrade:17-alpine"
    init: true
    user: postgres
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
    volumes:
      - postgres-data:/var/lib/postgresql/data/
      - .:/src:cache
    healthcheck:
      # CMD-SHELL takes a single command string; passing args as extra list
      # items silently drops them. Use the full command as one string.
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres -q"]
      # `start_interval` (Docker 25+) lets us poll aggressively during boot
      # and relax once the container is healthy.
      interval: 30s
      start_interval: 1s
      start_period: 20s
      timeout: 3s
      retries: 5

  hawkhundred:
    <<: *common-settings
    command: ["uv", "run", "-m", "manage", "runserver", "0.0.0.0:8000"]
    entrypoint: ["/src/compose-entrypoint.sh"]
    environment:
      - "DJANGO_SETTINGS_MODULE=config.settings_hawkhundred"
    ports:
      - "8010:8000"
    healthcheck:
      test: ["CMD-SHELL", "/src/healthcheck-web.sh"]
      interval: 30s
      start_interval: 2s
      start_period: 60s
      timeout: 5s
      retries: 3

  tailwind:
    <<: *common-settings
    command: ["/src/start-tailwind.sh"]

  utility:
    <<: *common-settings
    command: [
      "uv",
      "run",
      "--no-sync",
      "-m",
      "manage",
      "--version"
    ]
    entrypoint: ["/src/compose-entrypoint.sh"]

  web:
    <<: *common-settings
    command: ["/src/start-dev.sh"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "/src/healthcheck-web.sh"]
      interval: 30s
      start_interval: 2s
      start_period: 60s
      timeout: 5s
      retries: 3

  worker:
    <<: *common-settings
    command: ["/src/start-worker.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/src/healthcheck-worker.sh"]
      interval: 30s
      start_interval: 3s
      start_period: 60s
      timeout: 10s
      retries: 3

volumes:
  django-tailwind-cli-data:
  postgres-data:
